name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run tests
        env:
          PYTHON_JIT: "0"
        run: uv run pytest tests/ -q --tb=short

      - name: Lint (ruff)
        if: always()
        run: |
          uv pip install ruff
          uv run ruff check backend/ --select=E,F --ignore=E501
