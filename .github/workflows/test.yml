name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Debug Workspace Content
        run: |
          ls -R config/
          ls -R backend/core/
          ls -R tests/

      - name: Check Test Collection
        run: uv run pytest tests/ --collect-only

      - name: Run tests
        env:
          PYTHON_JIT: "0"
          DATABASE_URL: "sqlite:///:memory:"
        run: uv run pytest tests/ -v --tb=long --maxfail=10

      - name: Lint (ruff)
        if: always()
        run: |
          uv pip install ruff
          uv run ruff check backend/ --select=E,F --ignore=E501
